name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen --group api #install exactly the committed lockfile (+ api group: mypy checks src/pkmn_quant/api and tests/api import fastapi); fail if it's stale vs pyproject
      - run: uv run ruff check . #linting
      - run: uv run ruff format --check .
      - run: uv run mypy #type checking
      - run: uv run pytest --cov=pkmn_quant --cov-report=term-missing
      - name: C++ unit tests
        run: |
          cmake -S cpp -B cpp/build -DPKMN_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build cpp/build -j
          ctest --test-dir cpp/build --output-on-failure

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check   # tsc --noEmit && vitest run
      - run: npm run build
