name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen #install exactly the committed lockfile; fail if it's stale vs pyproject
      - run: uv run ruff check . #linting
      - run: uv run ruff format --check .
      - run: uv run mypy #type checking
      - run: uv run pytest --cov=pkmn_quant --cov-report=term-missing
